name: dev
on:
  push:
    branches:
      - dev
      - feat/template-preview
jobs:
  dev-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update base path in vite.config.ts
        run: |
          sed -i 's|base:.*|base: `/frontend/dev`,|' vite.config.ts
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm i
      - name: Build
        run: npx vite build
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          target-folder: /dev
          folder: dist
